<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMaster Pro - Modern Task Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">TM</div>
        <div>
          <h1>TaskMaster</h1>
          <p>Professional Task Management</p>
        </div>
      </div>

      <nav class="filter-section">
        <h2>Filters</h2>

        <div class="filter-group">
          <label>Status</label>
          <select id="filterStatus">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Priority</label>
          <select id="filterPriority">
            <option value="">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Category</label>
          <select id="filterCategory">
            <option value="">All Categories</option>
          </select>
        </div>

        <button id="applyFilters" type="button" class="filter-apply-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Apply Filters
        </button>
        <button id="clearFilters" type="button" class="filter-clear-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          Clear Filters
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Overview Stats -->
      <div class="overview-bar">
        <div class="stat-mini">
          <span class="stat-label">Total</span>
          <strong id="stat-total">0</strong>
        </div>
        <div class="stat-mini">
          <span class="stat-label">Pending</span>
          <strong id="stat-pending">0</strong>
        </div>
        <div class="stat-mini">
          <span class="stat-label">In Progress</span>
          <strong id="stat-progress">0</strong>
        </div>
        <div class="stat-mini">
          <span class="stat-label">Done</span>
          <strong id="stat-done">0</strong>
        </div>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search tasks..." />
          <button id="searchBtn" type="button" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Task List -->
      <section class="task-section">
        <div class="task-header">
          <div>
            <h2>Tasks</h2>
            <span id="taskCountBadge" class="task-count">0 tasks</span>
          </div>
          <button id="createTaskBtn" class="create-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Create New Task
          </button>
        </div>

        <div id="messageBox" class="message-box hidden"></div>

        <div id="taskList" class="task-list"></div>

        <!-- Pagination -->
        <div id="paginationContainer" class="pagination hidden"></div>
      </section>
    </main>
  </div>

  <!-- Task Modal -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Create New Task</h3>
        <button type="button" class="modal-close" id="closeModalBtn" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <form id="taskForm">
        <input type="hidden" id="taskId" />

        <div class="form-group">
          <label for="title">Title <span class="required">*</span></label>
          <input type="text" id="title" placeholder="Enter task title" required />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="4" placeholder="Describe your task in detail"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>

          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" />
          </div>

          <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id">
              <option value="">No Category</option>
            </select>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
            Cancel
          </button>
          <button type="submit" class="btn-primary" id="submitBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Create Task
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
